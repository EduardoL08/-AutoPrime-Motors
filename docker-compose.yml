version: "3.9"

# ─────────────────────────────────────────────
# AutoPrime Motors — Docker Compose
# Sobe: MongoDB + API Backend + Frontend (futuro)
# Uso: docker compose up --build
# ─────────────────────────────────────────────

services:

  mongodb:
    image: mongo:7.0
    container_name: autoprime_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: autoprime_user
      MONGO_INITDB_ROOT_PASSWORD: autoprime_pass
      MONGO_INITDB_DATABASE: autoprimemotors
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - autoprime_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1.0.2
    container_name: autoprime_mongo_express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: autoprime_user
      ME_CONFIG_MONGODB_ADMINPASSWORD: autoprime_pass
      ME_CONFIG_MONGODB_URL: mongodb://autoprime_user:autoprime_pass@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    ports:
      - "8081:8081"
    networks:
      - autoprime_network

 
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoprime_api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MongoDbSettings__ConnectionString: "mongodb://autoprime_user:autoprime_pass@mongodb:27017/autoprimemotors?authSource=admin"
      MongoDbSettings__DatabaseName: autoprimemotors
      JwtSettings__SecretKey: "AutoPrimeMotors_SuperSecretKey_2026_AcademicProject"
      JwtSettings__Issuer: AutoPrimeMotors
      JwtSettings__Audience: AutoPrimeMotorsClients
      JwtSettings__ExpirationInHours: 8
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "5000:5000"
    networks:
      - autoprime_network

volumes:
  mongo_data:
    name: autoprime_mongo_data

networks:
  autoprime_network:
    name: autoprime_network
    driver: bridge
